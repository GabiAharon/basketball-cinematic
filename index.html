<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Stars — Cinematic</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:   #3a1462;
      --secondary: #FDB927;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background: #000;
      font-family: 'Inter', sans-serif;
      color: #fff;
      user-select: none;
    }

    /* ── SCENE CONTAINER ── */
    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: 10;
    }

    /* ── MAIN BACKGROUND VIDEO (frozen on first frame, plays on navigate) ── */
    #snap-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
    }
    #snap-canvas.visible { opacity: 1; }

    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* ── BOKEH CANVAS (behind video, visible when no video loaded) ── */
    #bokeh-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── OVERLAYS ── */
    .bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(to right,  rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.22) 55%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to top,    rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.08) 45%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
    }

    /* ── CONTENT ── */
    #content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      padding: clamp(32px, 5vw, 72px) clamp(32px, 6vw, 100px);
      will-change: transform, opacity;
    }

    .player-number-bg {
      position: absolute;
      right: 3%;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(200px, 38vw, 580px);
      color: rgba(255,255,255,0.045);
      line-height: 1;
      pointer-events: none;
      letter-spacing: -0.02em;
    }

    .team-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 40px;
      padding: 7px 20px 7px 7px;
      margin-bottom: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      width: fit-content;
    }

    .team-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--secondary);
      flex-shrink: 0;
      transition: background 0.6s ease;
    }

    .player-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 9vw, 130px);
      line-height: 0.92;
      letter-spacing: 0.015em;
      margin-bottom: 18px;
      text-shadow: 0 8px 60px rgba(0,0,0,0.6);
    }

    .accent-line {
      width: 56px;
      height: 3px;
      background: var(--secondary);
      border-radius: 2px;
      margin-bottom: 18px;
      transition: background 0.6s ease;
    }

    .player-position {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ── TOP BAR ── */
    .site-logo {
      position: absolute;
      top: clamp(28px,4vw,52px);
      left: clamp(32px,6vw,100px);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .site-logo .logo-icon {
      width: 36px;
      height: 36px;
      border: 2px solid var(--secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: var(--secondary);
      letter-spacing: 0;
      box-shadow: 0 0 18px rgba(253, 185, 39, 0.25);
      flex-shrink: 0;
    }
    .site-logo .logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .site-logo .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 2.2vw, 24px);
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.9);
      line-height: 1;
    }
    .site-logo .logo-title span {
      color: var(--secondary);
    }
    .site-logo .logo-sub {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.3s;
    }
    .site-logo .logo-sub:hover {
      color: var(--secondary);
    }
    .logo-divider {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, transparent, var(--secondary), transparent);
      opacity: 0.4;
    }

    .player-counter {
      position: absolute;
      top: clamp(28px,4vw,52px);
      right: clamp(32px,6vw,100px);
      z-index: 20;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
    }
    .player-counter strong { color: #fff; font-weight: 700; }

    /* ── NAVIGATION ── */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      transition: background 0.25s, border-color 0.25s, scale 0.2s;
    }
    .nav-arrow:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); scale: 1.08; }
    .nav-arrow:active { scale: 0.96; }
    .nav-arrow.prev { left: 32px; }
    .nav-arrow.next { right: 32px; }
    .nav-arrow svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.85); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* ── DOTS ── */
    #dots {
      position: absolute;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .dot.active { background: var(--secondary); width: 28px; border-radius: 3px; }

    /* ── PROGRESS LINE ── */
    #progress-track {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      height: 2px;
      background: rgba(255,255,255,0.08);
    }
    #progress-fill {
      height: 100%;
      background: var(--secondary);
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1), background 0.6s ease;
    }

    .hint {
      position: absolute;
      bottom: 58px;
      right: clamp(32px,6vw,100px);
      z-index: 20;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
    }

    /* ── PLAYING INDICATOR ── */
    #transition-indicator {
      position: absolute;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: none;
      gap: 5px;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
    #transition-indicator.active { display: flex; }
    .pulse-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--secondary);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* ═══════════════════════════════════════════
       STATS SECTION (below the showcase)
    ═══════════════════════════════════════════ */
    #stats-section {
      position: relative;
      min-height: 100vh;
      background: #0a0a0a;
      padding: 0;
      overflow: hidden;
    }

    .stats-scroll-hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      animation: floatDown 2s ease-in-out infinite;
    }
    .stats-scroll-hint svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
    @keyframes floatDown {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    /* Stats container with gradient top fade */
    .stats-container {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px clamp(24px, 5vw, 80px) 60px;
    }
    .stats-container::before {
      content: '';
      position: absolute;
      top: -120px;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, #0a0a0a, transparent);
      pointer-events: none;
      z-index: 5;
    }

    /* ── BIO ROW ── */
    .bio-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 48px;
      opacity: 0;
    }
    .bio-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 12px;
      letter-spacing: 0.08em;
    }
    .bio-chip .bio-label {
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.15em;
    }
    .bio-chip .bio-value {
      color: #fff;
      font-weight: 400;
    }

    /* ── MAIN STAT CARDS ── */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 56px;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(40px);
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--secondary), transparent);
      opacity: 0.5;
    }
    .stat-card .stat-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 4vw, 52px);
      line-height: 1;
      color: #fff;
      margin-bottom: 6px;
    }
    .stat-card .stat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    .stat-card .stat-sub {
      font-size: 10px;
      color: var(--secondary);
      margin-top: 6px;
      opacity: 0.7;
    }

    /* ── SHOOTING BARS ── */
    .shooting-section {
      margin-bottom: 56px;
      opacity: 0;
    }
    .shooting-section h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.6);
    }
    .shooting-bar-wrap {
      margin-bottom: 18px;
    }
    .shooting-bar-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .shooting-bar-top .bar-label {
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      font-size: 10px;
    }
    .shooting-bar-top .bar-value {
      color: #fff;
      font-weight: 700;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
    }
    .shooting-bar-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .shooting-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      width: 0%;
      transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── CAREER TOTALS ── */
    .career-section {
      margin-bottom: 56px;
      opacity: 0;
    }
    .career-section h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.6);
    }
    .career-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .career-stat {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .career-stat .career-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--secondary);
    }
    .career-stat .career-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }

    /* ── SEASON HISTORY ── */
    .history-section {
      margin-bottom: 40px;
      opacity: 0;
    }
    .history-section h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.6);
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .history-table th {
      text-align: left;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .history-table td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
    }
    .history-table tr:last-child td {
      color: #fff;
      font-weight: 700;
    }
    .history-table .season-col {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: var(--secondary);
    }

    /* ── TEAM HEADER (logo + name) ── */
    .stats-team-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      opacity: 0;
    }
    .team-logo-wrap {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .team-logo-wrap img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    .team-info-text h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--secondary) 0%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .team-info-text .team-full-name {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .team-info-text .season-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* ── LAST GAME CARD ── */
    .last-game-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 48px;
      opacity: 0;
      position: relative;
      overflow: hidden;
    }
    .last-game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--secondary), var(--primary), transparent);
      opacity: 0.6;
    }
    .last-game-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 16px;
    }
    .last-game-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .last-game-matchup {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .lg-team {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .lg-team img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    .lg-team-abbr {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #fff;
    }
    .lg-vs {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
      font-weight: 700;
    }
    /* Score display between logos */
    .lg-score-block {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
    }
    .lg-score-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: rgba(255,255,255,0.4);
      line-height: 1;
      min-width: 36px;
      text-align: center;
    }
    .lg-score-num.winner {
      color: #fff;
      text-shadow: 0 0 20px var(--secondary);
    }
    .lg-score-dash {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: rgba(255,255,255,0.2);
    }

    .lg-result {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lg-result-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      padding: 4px 16px;
      border-radius: 8px;
      font-weight: 700;
    }
    .lg-result-badge.win {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .lg-result-badge.loss {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .lg-date {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }
    .last-game-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 12px;
    }
    .lg-stat {
      text-align: center;
      padding: 12px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .lg-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #fff;
      line-height: 1;
    }
    .lg-stat-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }

    /* ── HISTORY TABLE — team logos ── */
    .history-team-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-team-cell img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    /* Last updated */
    .stats-updated {
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
      padding: 20px;
    }
  </style>
</head>
<body>
<div id="scene">

<script>
/* ═══════════════════════════════════════════════════════
   PLAYERS DATA
═══════════════════════════════════════════════════════ */
const players = [
  {
    nameHTML: "LeBron<br>James",
    team:     "Los Angeles Lakers",
    number:   "23",
    position: "Small Forward",
    primary:  "#3a1462",
    secondary:"#FDB927",
    nbaId:    2544,
    poster:   "posters/lebron.jpg",
  },
  {
    nameHTML: "Deni<br>Avdija",
    team:     "Portland Trail Blazers",
    number:   "8",
    position: "Small Forward",
    primary:  "#5a0a0a",
    secondary:"#E03A3E",
    nbaId:    1629029,
    poster:   "posters/deni.jpg",
  },
  {
    nameHTML: "Stephen<br>Curry",
    team:     "Golden State Warriors",
    number:   "30",
    position: "Point Guard",
    primary:  "#0d2b6b",
    secondary:"#FFC72C",
    nbaId:    201939,
    poster:   "posters/curry.jpg",
  }
];

/* ═══════════════════════════════════════════════════════
   TRANSITION VIDEOS
   ─ Each video's FIRST FRAME = "poster" for the current player
   ─ Each video's LAST FRAME  = leads into the next player
   ─ Key format: "FROM-TO"
═══════════════════════════════════════════════════════ */
const transitions = {
  "0-1": "videos/deni lebron regular.mp4",       // LeBron → Deni (forward)
  "1-0": "videos/deni lebron reverse.mp4",      // Deni → LeBron (reverse)
  "1-2": "videos/dani steff 1.mp4",             // Deni → Curry (forward)
  "2-1": "videos/dani steff reverse.mp4",       // Curry → Deni (reverse)
  // "2-0": "videos/curry-to-lebron.mp4",
  // "0-2": "videos/lebron-to-curry-reverse.mp4",
};

/* ── STATE ── */
let current = 0;
let isPlaying = false;

/* ── BOKEH COLOR STATE (must be before setColors is called) ── */
let primaryRGB   = hexToRgb(players[0].primary);
let secondaryRGB = hexToRgb(players[0].secondary);
let targetPrimary   = { ...primaryRGB };
let targetSecondary = { ...secondaryRGB };

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function updateBokehColors(p, s) { targetPrimary = hexToRgb(p); targetSecondary = hexToRgb(s); }
function lerp(a,b,t) { return a+(b-a)*t; }
function lerpColor(c,t,sp=0.018) { return { r:lerp(c.r,t.r,sp), g:lerp(c.g,t.g,sp), b:lerp(c.b,t.b,sp) }; }

/* ── DOM ── */
const bgVideo       = document.getElementById('bg-video');
const content        = document.getElementById('content');
const playerNumBg    = document.getElementById('player-number-bg');
const teamDot        = document.getElementById('team-dot');
const teamNameEl     = document.getElementById('team-name');
const playerNameEl   = document.getElementById('player-name');
const playerPosEl    = document.getElementById('player-position');
const accentLine     = document.getElementById('accent-line');
const dotsWrap       = document.getElementById('dots');
const progressFill   = document.getElementById('progress-fill');
const playerCounter  = document.getElementById('player-counter');
const transitionIndicator = document.getElementById('transition-indicator');

/* ── BUILD DOTS ── */
players.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsWrap.appendChild(d);
});

/* ── COLOR SYSTEM ── */
function setColors(p) {
  document.documentElement.style.setProperty('--primary',   p.primary);
  document.documentElement.style.setProperty('--secondary', p.secondary);
  teamDot.style.background      = p.secondary;
  accentLine.style.background   = p.secondary;
  progressFill.style.background = p.secondary;
  updateBokehColors(p.primary, p.secondary);
}

function updateContent(p, idx) {
  playerNumBg.textContent  = p.number;
  teamNameEl.textContent   = p.team;
  playerNameEl.innerHTML   = p.nameHTML;
  playerPosEl.textContent  = p.position;
  playerCounter.innerHTML  = `<strong>${String(idx+1).padStart(2,'0')}</strong> / ${String(players.length).padStart(2,'0')}`;
}

function updateDots(idx) {
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

function updateProgress(idx) {
  progressFill.style.width = ((idx+1) / players.length * 100) + '%';
}

/* ═══════════════════════════════════════════════════════
   LOAD VIDEO & FREEZE ON FIRST FRAME
   ─ Loads transition video for current player
   ─ Pauses at frame 0 so first frame = static background
═══════════════════════════════════════════════════════ */
/* Snapshot: capture current video frame to canvas to prevent flash during src swap */
const snapCanvas = document.getElementById('snap-canvas');
const snapCtx = snapCanvas.getContext('2d');

function showSnapshot() {
  try {
    if (bgVideo.readyState >= 2 && bgVideo.videoWidth > 0) {
      snapCanvas.width  = bgVideo.videoWidth;
      snapCanvas.height = bgVideo.videoHeight;
      snapCtx.drawImage(bgVideo, 0, 0);
      snapCanvas.classList.add('visible');
    }
  } catch(e) { /* ignore */ }
}
function hideSnapshot() {
  snapCanvas.classList.remove('visible');
}

/* Freeze-seek handler: defined at module level so playTransition can cancel it */
function _freezeSeeked() {
  bgVideo.removeEventListener('seeked', _freezeSeeked);
  bgVideo.pause();
  hideSnapshot();
}
function cancelPendingFreeze() {
  bgVideo.removeEventListener('seeked', _freezeSeeked);
}

function loadAndFreeze(fromIdx) {
  // Update poster for mobile fallback (only matters on initial load / if video never loads)
  bgVideo.setAttribute('poster', players[fromIdx].poster);

  // Capture current frame as snapshot BEFORE changing src (prevents flash)
  showSnapshot();

  // Try to find ANY transition video that starts or ends at this player
  const nextIdx = (fromIdx + 1) % players.length;
  const forwardKey = `${fromIdx}-${nextIdx}`;
  const prevIdx = (fromIdx - 1 + players.length) % players.length;
  const reverseKey = `${prevIdx}-${fromIdx}`;

  // Helper: hide snapshot only AFTER seek completes (prevents frame flash)
  function hideAfterSeek() {
    cancelPendingFreeze(); // remove any stale one
    bgVideo.addEventListener('seeked', _freezeSeeked);
  }

  if (transitions[forwardKey]) {
    bgVideo.src = transitions[forwardKey];
    bgVideo.load();
    bgVideo.onloadeddata = () => {
      bgVideo.currentTime = 0;
      hideAfterSeek();
    };
  } else if (transitions[reverseKey]) {
    bgVideo.src = transitions[reverseKey];
    bgVideo.load();
    function seekToEnd() {
      if (bgVideo.duration && isFinite(bgVideo.duration) && bgVideo.duration > 0) {
        bgVideo.currentTime = bgVideo.duration - 0.05;
        hideAfterSeek();
      } else {
        bgVideo.addEventListener('loadedmetadata', function h() {
          bgVideo.removeEventListener('loadedmetadata', h);
          bgVideo.currentTime = bgVideo.duration - 0.05;
          hideAfterSeek();
        });
      }
    }
    bgVideo.onloadeddata = seekToEnd;
  } else {
    bgVideo.pause();
    hideSnapshot();
  }

  // Safety: hide snapshot after 3s max (in case events don't fire)
  setTimeout(hideSnapshot, 3000);
}

/* ═══════════════════════════════════════════════════════
   NAVIGATION
   ─ Click right → play video → on end → swap to next player, freeze
   ─ Click left  → GSAP fallback (or reverse video if available)
═══════════════════════════════════════════════════════ */
function goTo(nextIdx) {
  if (isPlaying || nextIdx === current) return;

  const key = `${current}-${nextIdx}`;
  const src = transitions[key];

  if (src) {
    playTransition(nextIdx);
  } else {
    playFallback(nextIdx);
  }
}

/* Play transition video → on end, swap to next player immediately */
function playTransition(nextIdx) {
  isPlaying = true;
  transitionIndicator.classList.add('active');

  const key = `${current}-${nextIdx}`;
  const src = transitions[key];

  // Fade out the text content immediately
  gsap.killTweensOf(content);
  content.style.opacity = '0';

  // Cancel ALL stale handlers from loadAndFreeze (prevents ghost pause)
  cancelPendingFreeze();
  bgVideo.onloadeddata = null;

  // Snapshot current frame, then load the transition video
  showSnapshot();
  bgVideo.pause();
  bgVideo.currentTime = 0;
  bgVideo.src = src;
  bgVideo.load();

  // Safety timeout — if video never starts within 5s, force finish
  const safetyTimeout = setTimeout(() => {
    if (isPlaying) {
      console.warn('Video load timeout — forcing transition');
      finishTransition(nextIdx);
    }
  }, 5000);

  function startPlayback() {
    clearTimeout(safetyTimeout);
    bgVideo.currentTime = 0;
    const playPromise = bgVideo.play();

    if (playPromise) {
      playPromise.then(() => {
        // Video is playing — hide snapshot and poll for end
        hideSnapshot();
        pollForEnd(nextIdx);
        showPlayerInfoEarly(nextIdx);
      }).catch((err) => {
        console.warn('Autoplay blocked:', err);
        // Autoplay blocked — just swap immediately
        finishTransition(nextIdx);
      });
    }
  }

  if (bgVideo.readyState >= 3) {
    startPlayback();
  } else {
    bgVideo.addEventListener('canplay', function handler() {
      bgVideo.removeEventListener('canplay', handler);
      startPlayback();
    });
    // Also listen for error
    bgVideo.addEventListener('error', function errHandler() {
      bgVideo.removeEventListener('error', errHandler);
      clearTimeout(safetyTimeout);
      console.warn('Video load error — forcing transition');
      finishTransition(nextIdx);
    });
  }
}

/* Poll every 100ms to detect video end (+ stall detection with retry) */
function pollForEnd(nextIdx) {
  let lastTime = -1;
  let stallCount = 0;
  let retryCount = 0;
  let hasEverPlayed = false;
  const poll = setInterval(() => {
    // Check if video has ended normally
    if (bgVideo.ended || (bgVideo.duration > 0 && bgVideo.currentTime >= bgVideo.duration - 0.15)) {
      clearInterval(poll);
      bgVideo.pause();
      onVideoFullyEnded();
      return;
    }
    // Track if video ever progressed
    if (bgVideo.currentTime > 0.1) hasEverPlayed = true;

    // Stall detection: only count stalls AFTER video started playing
    if (hasEverPlayed && (bgVideo.paused || bgVideo.currentTime === lastTime)) {
      stallCount++;

      // After 1.5s stalled, try to resume playback
      if (stallCount === 15 && retryCount < 3) {
        retryCount++;
        console.log('Video stalled, retry #' + retryCount);
        bgVideo.play().catch(() => {});
        stallCount = 10; // reset partially
      }

      // After 4s total stall (with retries exhausted), force end
      if (stallCount >= 40) {
        clearInterval(poll);
        bgVideo.pause();
        console.warn('Video stalled — forcing end');
        onVideoFullyEnded();
        return;
      }
    } else {
      stallCount = 0;
    }
    lastTime = bgVideo.currentTime;
  }, 100);
}

/* Show player info early (2 seconds before video ends) */
function showPlayerInfoEarly(nextIdx) {
  function scheduleEarly() {
    const dur = bgVideo.duration;
    if (!dur || !isFinite(dur) || dur <= 0) {
      // Duration not yet known — wait for it
      bgVideo.addEventListener('durationchange', function dh() {
        bgVideo.removeEventListener('durationchange', dh);
        scheduleEarly();
      });
      return;
    }

    const earlyTime = Math.max(0, (dur - 2) * 1000);

    setTimeout(() => {
      if (!isPlaying) return; // Already finished

    // Swap data
    current = nextIdx;
    updateContent(players[current], current);
    setColors(players[current]);
    updateDots(current);
    updateProgress(current);

    // Animate text in with GSAP
    gsap.killTweensOf(content);
    gsap.fromTo(content,
      { opacity: 0, y: 30 },
      { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }
    );
    gsap.fromTo('#player-name',
      { opacity: 0, x: -30 },
      { opacity: 1, x: 0, duration: 0.6, ease: 'power2.out', delay: 0.1 }
    );
    gsap.fromTo('.team-badge',
      { opacity: 0, scale: 0.9 },
      { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.4)', delay: 0.2 }
    );
    gsap.fromTo('.accent-line',
      { width: 0 },
      { width: 56, duration: 0.5, ease: 'power2.out', delay: 0.25 }
    );
    gsap.fromTo('.player-position',
      { opacity: 0 },
      { opacity: 1, duration: 0.4, delay: 0.35 }
    );
    }, earlyTime);
  }
  scheduleEarly();
}

/* Called when video fully ends (just cleanup, info already shown) */
function onVideoFullyEnded() {
  transitionIndicator.classList.remove('active');
  isPlaying = false;
  // Load & freeze the first frame of the NEXT transition from the new current player
  loadAndFreeze(current);
}

/* Legacy fallback: show info immediately if video is very short */
function finishTransition(nextIdx) {
  if (!isPlaying) return;

  current = nextIdx;
  updateContent(players[current], current);
  setColors(players[current]);
  updateDots(current);
  updateProgress(current);

  gsap.killTweensOf(content);
  transitionIndicator.classList.remove('active');
  isPlaying = false;
  content.style.opacity = '1';
  loadAndFreeze(current);
}

/* Fallback: GSAP slide animation (no video available) */
function playFallback(nextIdx) {
  isPlaying = true;
  const dir  = nextIdx > current ? 1 : -1;
  const outX = dir === 1 ? -110 : 110;
  const inX  = dir === 1 ?  110 : -110;

  const tl = gsap.timeline({
    onComplete: () => { isPlaying = false; }
  });

  tl.to(content, { x: outX, opacity: 0, duration: 0.38, ease: 'power2.in' });
  tl.call(() => {
    current = nextIdx;
    updateContent(players[current], current);
    setColors(players[current]);
    updateDots(current);
    updateProgress(current);
    loadAndFreeze(current);
    gsap.set(content, { x: inX });
  });
  tl.to(content, { x: 0, opacity: 1, duration: 0.55, ease: 'power3.out' });
  tl.fromTo(playerNumBg,
    { scale: 0.92, opacity: 0 },
    { scale: 1, opacity: 1, duration: 0.6, ease: 'power2.out' }, '<0.1'
  );
}

/* ── CONTROLS ── */
document.getElementById('next-btn').addEventListener('click', () => goTo((current + 1) % players.length));
document.getElementById('prev-btn').addEventListener('click', () => goTo((current - 1 + players.length) % players.length));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo((current + 1) % players.length);
  if (e.key === 'ArrowLeft')  goTo((current - 1 + players.length) % players.length);
});

let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend',   e => {
  const d = touchX - e.changedTouches[0].clientX;
  if (Math.abs(d) > 50) d > 0
    ? goTo((current + 1) % players.length)
    : goTo((current - 1 + players.length) % players.length);
});

/* ── INIT ── */
setColors(players[0]);
updateContent(players[0], 0);
updateProgress(0);
gsap.set(content, { x: 0, opacity: 1 });

// Freeze first video on frame 0 (src already set in HTML)
bgVideo.pause();
bgVideo.currentTime = 0;

/* ── LOGO ENTRANCE ANIMATION ── */
const logoEl = document.getElementById('site-logo');
const logoTl = gsap.timeline({ delay: 0.3 });
logoTl.fromTo(logoEl.querySelector('.logo-icon'),
  { scale: 0, rotation: -180, opacity: 0 },
  { scale: 1, rotation: 0, opacity: 1, duration: 0.8, ease: 'back.out(1.7)' }
);
logoTl.fromTo(logoEl.querySelector('.logo-divider'),
  { scaleY: 0, opacity: 0 },
  { scaleY: 1, opacity: 0.4, duration: 0.4, ease: 'power2.out' }, '-=0.3'
);
logoTl.fromTo(logoEl.querySelector('.logo-title'),
  { x: -20, opacity: 0 },
  { x: 0, opacity: 1, duration: 0.5, ease: 'power3.out' }, '-=0.2'
);
logoTl.fromTo(logoEl.querySelector('.logo-sub'),
  { x: -10, opacity: 0 },
  { x: 0, opacity: 1, duration: 0.4, ease: 'power2.out' }, '-=0.2'
);

/* ═══════════════════════════════════════════════════════
   BOKEH CANVAS (behind video)
═══════════════════════════════════════════════════════ */
const canvas = document.getElementById('bokeh-canvas');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const orbs = [
  { x:0.75, y:0.25, r:0.55, vx: 0.00018, vy: 0.00012, type:'primary',   alpha:0.55 },
  { x:0.25, y:0.70, r:0.40, vx:-0.00010, vy:-0.00015, type:'secondary', alpha:0.28 },
  { x:0.50, y:0.15, r:0.30, vx: 0.00022, vy: 0.00008, type:'primary',   alpha:0.20 },
  { x:0.80, y:0.80, r:0.25, vx:-0.00014, vy: 0.00018, type:'secondary', alpha:0.22 },
];

function drawFrame() {
  primaryRGB   = lerpColor(primaryRGB,   targetPrimary);
  secondaryRGB = lerpColor(secondaryRGB, targetSecondary);

  ctx.fillStyle = '#030303';
  ctx.fillRect(0, 0, W, H);

  orbs.forEach(o => {
    o.x += o.vx; o.y += o.vy;
    if (o.x < -0.1 || o.x > 1.1) o.vx *= -1;
    if (o.y < -0.1 || o.y > 1.1) o.vy *= -1;

    const c  = o.type === 'primary' ? primaryRGB : secondaryRGB;
    const cx = o.x * W, cy = o.y * H, rad = o.r * Math.min(W,H);
    const g  = ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0,   `rgba(${c.r},${c.g},${c.b},${o.alpha})`);
    g.addColorStop(0.5, `rgba(${c.r},${c.g},${c.b},${o.alpha*0.3})`);
    g.addColorStop(1,   `rgba(${c.r},${c.g},${c.b},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
  });

  requestAnimationFrame(drawFrame);
}
drawFrame();

   STATS SECTION — loads stats.json & animates on scroll
═══════════════════════════════════════════════════════ */

let statsData = null;
const PLAYER_NAME_MAP = {

  MIA: { name: 'Miami Heat', id: 1610612748 },
  MIL: { name: 'Milwaukee Bucks', id: 1610612749 },
  MIN: { name: 'Minnesota Timberwolves', id: 1610612750 },
  NOP: { name: 'New Orleans Pelicans', id: 1610612740 },
  NYK: { name: 'New York Knicks', id: 1610612752 },
  OKC: { name: 'Oklahoma City Thunder', id: 1610612760 },
  ORL: { name: 'Orlando Magic', id: 1610612753 },
  PHI: { name: 'Philadelphia 76ers', id: 1610612755 },
  PHX: { name: 'Phoenix Suns', id: 1610612756 },
  POR: { name: 'Portland Trail Blazers', id: 1610612757 },
  SAC: { name: 'Sacramento Kings', id: 1610612758 },
  SAS: { name: 'San Antonio Spurs', id: 1610612759 },
  TOR: { name: 'Toronto Raptors', id: 1610612761 },
  UTA: { name: 'Utah Jazz', id: 1610612762 },
  WAS: { name: 'Washington Wizards', id: 1610612764 },
};

function teamLogoUrl(abbr) {
  const t = NBA_TEAMS[abbr];
  if (!t) return '';
  return `https://cdn.nba.com/logos/nba/${t.id}/global/L/logo.svg`;
}

function parseMatchup(matchup) {
  // "LAL @ ORL" or "GSW vs. DET"
  const parts = matchup.split(/\s+(?:@|vs\.?)\s+/i);
  const isAway = matchup.includes('@');
  return {
    team1: parts[0]?.trim() || '',
    team2: parts[1]?.trim() || '',
    isAway
  };
}

// Load stats.json
fetch('stats.json')
  .then(r => r.json())
  .then(data => {
    statsData = data;
    document.getElementById('stats-updated').textContent =
      'Last updated: ' + new Date(data.last_updated).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    renderStats(current);
  })
  .catch(() => {
    document.getElementById('stats-updated').textContent = 'Stats unavailable — run fetch_stats.py';
  });

function renderStats(playerIdx) {
  if (!statsData) return;
  const name = PLAYER_NAME_MAP[playerIdx];
  const p = statsData.players[name];
  if (!p) return;

  // Team header with logo
  const teamAbbr = p.current_season.team;
  const teamInfo = NBA_TEAMS[teamAbbr] || { name: teamAbbr };
  document.getElementById('stats-player-name').textContent = p.name;
  document.getElementById('stats-team-name').textContent = teamInfo.name;
  document.getElementById('stats-season').textContent = p.current_season.season + ' Season';
  document.getElementById('stats-team-logo').src = teamLogoUrl(teamAbbr);
  document.getElementById('stats-team-logo').alt = teamInfo.name;

  // Last game card
  const lgCard = document.getElementById('last-game-card');
  const lg = p.last_game;
  if (lg && lg.matchup) {
    const mu = parseMatchup(lg.matchup);
    const oppAbbr = mu.team2;
    const isWin = lg.result === 'W';
    // Build score display — match pts to the correct team logo order
    const sc = lg.score;
    let scoreHtml = '';
    if (sc && sc.team1_abbr) {
      // mu.team1 = player's team (left logo), mu.team2 = opponent (right logo)
      // sc data may be in different order — map by abbreviation
      const leftPts  = sc.team1_abbr === mu.team1 ? sc.team1_pts : sc.team2_pts;
      const rightPts = sc.team1_abbr === mu.team1 ? sc.team2_pts : sc.team1_pts;
      scoreHtml = `
        <div class="lg-score-block">
          <span class="lg-score-num ${leftPts > rightPts ? 'winner' : ''}">${leftPts}</span>
          <span class="lg-score-dash">—</span>
          <span class="lg-score-num ${rightPts > leftPts ? 'winner' : ''}">${rightPts}</span>
        </div>`;
    }

    lgCard.innerHTML = `
      <div class="last-game-label">Last Game · ${lg.date}</div>
      <div class="last-game-top">
        <div class="last-game-matchup">
          <div class="lg-team">
            <img src="${teamLogoUrl(mu.team1)}" alt="${mu.team1}">
            <span class="lg-team-abbr">${mu.team1}</span>
          </div>
          ${scoreHtml || `<span class="lg-vs">${mu.isAway ? '@' : 'VS'}</span>`}
          <div class="lg-team">
            <img src="${teamLogoUrl(oppAbbr)}" alt="${oppAbbr}">
            <span class="lg-team-abbr">${oppAbbr}</span>
          </div>
        </div>
        <div class="lg-result">
          <span class="lg-result-badge ${isWin ? 'win' : 'loss'}">${isWin ? 'WIN' : 'LOSS'}</span>
        </div>
      </div>
      <div class="last-game-stats">
        <div class="lg-stat"><div class="lg-stat-num">${lg.pts}</div><div class="lg-stat-label">PTS</div></div>
        <div class="lg-stat"><div class="lg-stat-num">${lg.reb}</div><div class="lg-stat-label">REB</div></div>
        <div class="lg-stat"><div class="lg-stat-num">${lg.ast}</div><div class="lg-stat-label">AST</div></div>
        <div class="lg-stat"><div class="lg-stat-num">${lg.stl}</div><div class="lg-stat-label">STL</div></div>
        <div class="lg-stat"><div class="lg-stat-num">${lg.blk}</div><div class="lg-stat-label">BLK</div></div>
        <div class="lg-stat"><div class="lg-stat-num">${lg.fg_pct}%</div><div class="lg-stat-label">FG%</div></div>
        <div class="lg-stat"><div class="lg-stat-num">${lg.min}</div><div class="lg-stat-label">MIN</div></div>
      </div>
    `;
  } else {
    lgCard.innerHTML = '';
  }

  // Bio
  const bioRow = document.getElementById('bio-row');
  bioRow.innerHTML = [
    { label: 'Height', value: p.bio.height },
    { label: 'Weight', value: p.bio.weight + ' lbs' },
    { label: 'Country', value: p.bio.country },
    { label: 'Draft', value: p.bio.draft_year + ' R' + p.bio.draft_round + ' #' + p.bio.draft_number },
    { label: 'Experience', value: p.bio.years_pro + ' Years' },
  ].map(b => `
    <div class="bio-chip">
      <span class="bio-label">${b.label}</span>
      <span class="bio-value">${b.value}</span>
    </div>
  `).join('');

  // Stat cards
  const cards = document.getElementById('stat-cards');
  const cs = p.current_season;
  cards.innerHTML = [
    { num: cs.ppg, label: 'Points', sub: cs.total_pts + ' total' },
    { num: cs.rpg, label: 'Rebounds', sub: cs.total_reb + ' total' },
    { num: cs.apg, label: 'Assists', sub: cs.total_ast + ' total' },
    { num: cs.spg, label: 'Steals', sub: '' },
    { num: cs.bpg, label: 'Blocks', sub: '' },
    { num: cs.gp, label: 'Games', sub: '' },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-number" data-target="${s.num}">${s.num}</div>
      <div class="stat-label">${s.label}</div>
      ${s.sub ? '<div class="stat-sub">' + s.sub + '</div>' : ''}
    </div>
  `).join('');

  // Shooting bars
  const bars = document.getElementById('shooting-bars');
  bars.innerHTML = [
    { label: 'Field Goal %', value: cs.fg_pct },
    { label: '3-Point %', value: cs.fg3_pct },
    { label: 'Free Throw %', value: cs.ft_pct },
  ].map(b => `
    <div class="shooting-bar-wrap">
      <div class="shooting-bar-top">
        <span class="bar-label">${b.label}</span>
        <span class="bar-value">${b.value}%</span>
      </div>
      <div class="shooting-bar-track">
        <div class="shooting-bar-fill" data-width="${b.value}"></div>
      </div>
    </div>
  `).join('');

  // Career grid
  const cg = document.getElementById('career-grid');
  const cr = p.career;
  cg.innerHTML = [
    { num: cr.total_pts.toLocaleString(), label: 'Total Points' },
    { num: cr.total_reb.toLocaleString(), label: 'Total Rebounds' },
    { num: cr.total_ast.toLocaleString(), label: 'Total Assists' },
    { num: cr.gp.toLocaleString(), label: 'Games Played' },
    { num: cr.ppg, label: 'Career PPG' },
    { num: cr.seasons, label: 'Seasons' },
  ].map(s => `
    <div class="career-stat">
      <div class="career-num">${s.num}</div>
      <div class="career-label">${s.label}</div>
    </div>
  `).join('');

  // History table with team logos
  const hb = document.getElementById('history-body');
  hb.innerHTML = p.season_history.map(s => `
    <tr>
      <td class="season-col">${s.season}</td>
      <td><div class="history-team-cell"><img src="${teamLogoUrl(s.team)}" alt="${s.team}"><span>${s.team}</span></div></td>
      <td>${s.gp}</td>
      <td>${s.ppg}</td>
      <td>${s.rpg}</td>
      <td>${s.apg}</td>
    </tr>
  `).join('');

  // Re-trigger animations
  setupStatsAnimations();
}

function setupStatsAnimations() {
  // Kill previous ScrollTriggers
  ScrollTrigger.getAll().forEach(t => t.kill());

  // Team header with logo
  gsap.fromTo('#stats-team-header',
    { opacity: 0, y: 40 },
    { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out',
      scrollTrigger: { trigger: '#stats-team-header', start: 'top 85%', toggleActions: 'play none none reverse' }
    });

  // Last game card
  gsap.fromTo('#last-game-card',
    { opacity: 0, y: 30, scale: 0.98 },
    { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: 'power2.out',
      scrollTrigger: { trigger: '#last-game-card', start: 'top 85%', toggleActions: 'play none none reverse' }
    });

  // Bio row
  gsap.fromTo('#bio-row',
    { opacity: 0, y: 30 },
    { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out',
      scrollTrigger: { trigger: '#bio-row', start: 'top 85%', toggleActions: 'play none none reverse' }
    });

  // Stat cards staggered
  gsap.fromTo('.stat-card',
    { opacity: 0, y: 40, scale: 0.95 },
    { opacity: 1, y: 0, scale: 1, duration: 0.6, stagger: 0.1, ease: 'back.out(1.2)',
      scrollTrigger: { trigger: '#stat-cards', start: 'top 85%', toggleActions: 'play none none reverse' }
    });

  // Shooting bars
  gsap.fromTo('#shooting-section',
    { opacity: 0 },
    { opacity: 1, duration: 0.5,
      scrollTrigger: {
        trigger: '#shooting-section', start: 'top 85%', toggleActions: 'play none none reverse',
        onEnter: () => {
          document.querySelectorAll('.shooting-bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.width + '%';
          });
        },
        onLeaveBack: () => {
          document.querySelectorAll('.shooting-bar-fill').forEach(bar => {
            bar.style.width = '0%';
          });
        }
      }
    });

  // Career section
  gsap.fromTo('#career-section',
    { opacity: 0, y: 30 },
    { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out',
      scrollTrigger: { trigger: '#career-section', start: 'top 85%', toggleActions: 'play none none reverse' }
    });

  // History table
  gsap.fromTo('#history-section',
    { opacity: 0, y: 30 },
    { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out',
      scrollTrigger: { trigger: '#history-section', start: 'top 85%', toggleActions: 'play none none reverse' }
    });

  ScrollTrigger.refresh();
}

// Update stats when player changes
const _origUpdateContent = updateContent;
updateContent = function(p, idx) {
  _origUpdateContent(p, idx);
  renderStats(idx);
};

// Scroll to top when navigating between players
const _origGoTo = goTo;
goTo = function(nextIdx) {
  if (window.scrollY > 50) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(() => _origGoTo(nextIdx), 400);
  } else {
    _origGoTo(nextIdx);
  }
};

// Hide scroll hint when scrolling
window.addEventListener('scroll', () => {
  const hint = document.getElementById('scroll-hint');
  if (hint) hint.style.opacity = window.scrollY > 100 ? '0' : '1';
}, { passive: true });
</script>
